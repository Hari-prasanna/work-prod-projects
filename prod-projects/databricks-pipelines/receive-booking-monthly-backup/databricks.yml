bundle:
  name: receive_booking_monthly_backup

resources:
  jobs:
    receive_booking_monthly_backup:
      name: Receive_Booking_Monthly_Backup
      

      # SCHEDULE CONFIGURATION
      schedule:
        quartz_cron_expression: "0 30 23 L * ?"
        timezone_id: "Europe/Berlin" 
        pause_status: "UNPAUSED"

      # CLUSTER CONFIGURATION
      job_clusters:
        - job_cluster_key: Job_cluster
          new_cluster:
            spark_version: 17.3.x-scala2.13
            policy_id: "000294BBB7FAF7AF"
            node_type_id: r7gd.large
            num_workers: 0
            data_security_mode: SINGLE_USER #enables Unity Catalog access
            spark_conf:
              spark.databricks.cluster.profile: singleNode
              spark.master: local[*]
            custom_tags:
              ResourceClass: SingleNode
              cost_allocation: "50019562"

      # TASK DEFINITIONS
      tasks:
        - task_key: Monthly_Backup_Task
          job_cluster_key: Job_cluster
          notebook_task:
            notebook_path: ./src/booking_backup.py
          libraries:
            - pypi:
                package: oracledb==2.1.2 
            - pypi:
                package: gspread==6.1.0
            - pypi:
                package: sqlalchemy==2.0.25

# TARGET ENVIRONMENTS
targets:
  dev:
    mode: development
    default: true
    presets:
      name_prefix: "[dev ${workspace.current_user.short_name}] "
    workspace:
      host: https://zalando-e2.cloud.databricks.com

  prod:
    mode: production
    workspace:
      host: https://zalando-e2.cloud.databricks.com